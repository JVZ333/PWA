<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LembreteFácil - Sua Agenda PWA</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4A90E2">
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then(reg => console.log("Service Worker registrado!", reg))
          .catch(err => console.log("Erro no registro:", err));
      });
    }
  </script>
</head>
<body>
  <header>
    <h1>LembreteFácil</h1>
    <p>Sua organização pessoal, em qualquer lugar.</p>
  </header>
  
  <main>
    <section id="add-task">
      <input type="text" id="taskInput" placeholder="O que você precisa lembrar?">
      <button onclick="addTask()">Adicionar</button>
    </section>

    <ul id="taskList">
      <li>Exemplo: Estudar Service Workers</li>
    </ul>
  </main>

  <script>
    function addTask() {
      const input = document.getElementById('taskInput');
      if (input.value.trim() !== "") {
        const li = document.createElement('li');
        li.textContent = input.value;
        document.getElementById('taskList').appendChild(li);
        input.value = "";
      }
    }
  </script>
</body>
</html>
